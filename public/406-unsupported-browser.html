<!doctype html>
<html lang="en">
<head>

  <title>Browser not supported — Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111827;

      align-items: center;
      justify-content: center;
      min-height: 100dvh;

    .code { font-size: 48px; font-weight: 600; color: #d1d5db; line-height: 1; margin-bottom: 16px; }
    .app-name { font-size: 24px; font-weight: 600; color: #111827; margin-bottom: 8px; }

<body>
  <main>
    <div class="code">406</div>
